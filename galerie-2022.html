<head>
  <meta charset="UTF-8" />

  <title>Galerie 2022 — Oyster House Festival</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="edition.css" />
  <style>
    .gal-full {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 4px;
    }
    .gal__item {
      display: block;
      overflow: hidden;
      aspect-ratio: 3/2;
      background: #1a2e2c;
    }
    .gal__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .gal__item:hover img { transform: scale(1.03); }
    .galerie-header {
      padding: 6rem 2rem 2rem;
      text-align: center;
    }
    .galerie-header__label {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .galerie-header__title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: var(--text-primary);
      margin: 0 0 0.5rem;
    }
    .galerie-header__count {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .galerie-back {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    .galerie-back:hover { color: var(--gold); }
  </style>
</head>

    import PhotoSwipe from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js';

    const lightbox = new PhotoSwipeLightbox({
      gallery: '#gallery-2022',
      children: 'a',
      pswpModule: PhotoSwipe,
      bgOpacity: 0.95,
    });

    lightbox.on('uiRegister', function() {
      lightbox.pswp.ui.registerElement({
        name: 'download-button',
        order: 8,
        isButton: true,
        tagName: 'a',
        html: '&#8595;',
        title: 'Télécharger cette photo',
        onInit: (el, pswp) => {
          el.setAttribute('download', '');
          el.setAttribute('target', '_blank');
          el.style.cssText = 'font-size:22px;padding:8px 14px;color:#fff;text-decoration:none;line-height:1;';
          pswp.on('change', () => {
            el.href = pswp.currSlide.data.src;
          });
        }
      });
    });

    lightbox.init();
  </script>
</body>
</html>
