server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Cache 1 an sur les images (noms de fichier stables = immutables)
    location ~* \.(jpg|jpeg|png|webp|svg|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Cache 1 mois sur CSS et JS
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Pas de cache sur le HTML (mises à jour régulières du contenu)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Fallback 404 → page d'accueil
    error_page 404 /index.html;

    # Sécurité basique
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
